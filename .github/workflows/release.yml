name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    name: Build Linux (${{ matrix.arch_name }})
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - target: "x86_64-unknown-linux-gnu"
            arch_name: "amd64"
          - target: "aarch64-unknown-linux-gnu"
            arch_name: "arm64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: "true"
          fetch-depth: 2

      # Install cross-compilation tools for ARM
      - name: Install cross-compilation tools (Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > rustup-init.sh
          sh rustup-init.sh -y --default-toolchain stable
          . "$HOME/.cargo/env"
          rustup target add ${{ matrix.target }}

      - name: Setup for cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          . "$HOME/.cargo/env"

          echo "TARGET_CC=aarch64-linux-gnu-gcc" >> "${GITHUB_ENV}"
          echo "TARGET_CXX=aarch64-linux-gnu-g++" >> "${GITHUB_ENV}"
          echo "TARGET_AR=aarch64-linux-gnu-ar" >> "${GITHUB_ENV}"
          echo "TARGET_RANLIB=aarch64-linux-gnu-ranlib" >> "${GITHUB_ENV}"

          echo "BINDGEN_EXTRA_CLANG_ARGS=--sysroot=/usr/aarch64-linux-gnu" >> "${GITHUB_ENV}"

          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << EOF
          [target.aarch64-unknown-linux-gnu]
          ar = "aarch64-linux-gnu-ar"
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release version
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          mkdir -p release-assets
          cp target/${{ matrix.target }}/release/ralfpack release-assets/ralfpack-linux-${{ matrix.arch_name }}

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Debian package
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev debhelper
          mkdir -p debian-package/DEBIAN
          mkdir -p debian-package/usr/bin
          cp target/${{ matrix.target }}/release/ralfpack debian-package/usr/bin/
          chmod +x debian-package/usr/bin/ralfpack
          cat > debian-package/DEBIAN/control << EOF
          Package: ralfpack
          Version: ${{ steps.get_version.outputs.version }}
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.arch_name }}
          Maintainer: Sky UK <ben.gray@sky.uk>
          Description: RalfPack utility
           A Rust-based utility for working with RALF packages.
          EOF
          dpkg-deb --build debian-package ralfpack_${{ steps.get_version.outputs.version }}_${{ matrix.arch_name }}.deb
          cp ralfpack_${{ steps.get_version.outputs.version }}_${{ matrix.arch_name }}.deb release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-assets-${{ matrix.arch_name }}
          path: release-assets/*

  build-macos:
    runs-on: macos-14
    name: Build macOS (${{ matrix.arch_name }})
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - target: "x86_64-apple-darwin"
            arch: "x86_64"
            arch_name: "amd64"
          - target: "aarch64-apple-darwin"
            arch: "aarch64"
            arch_name: "arm64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: "true"
          fetch-depth: 2

      # Autotools is needed to build the erofs-utils C code
      - name: Install autotools (macOS)
        run: |
          brew install autoconf automake libtool

      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > rustup-init.sh
          sh rustup-init.sh -y --default-toolchain stable
          . "$HOME/.cargo/env"
          rustup target add ${{ matrix.target }}

      - name: Build release version
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          mkdir -p release-assets
          cp target/${{ matrix.target }}/release/ralfpack release-assets/ralfpack-macos-${{ matrix.arch_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets-${{ matrix.arch_name }}
          path: release-assets/*

  publish:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-assets
          merge-multiple: true

      - name: List assets
        run: ls -R all-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
