name: Build macOS

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.cfg_release_channel }} on ${{ matrix.os }})

    # Timeout after
    timeout-minutes: 20

    # Build for macOS ARM64 architecture
    strategy:
      matrix:
        include:
          - target: "aarch64-apple-darwin"
            os: "macos-14"
            arch: "aarch64"
            arch_name: "arm64"
            cfg_release_channel: "stable"

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Autotools is needed to build the erofs-utils C code
      - name: Install autotools (macOS)
        run: |
          brew install autoconf automake libtool

      # Install rustup
      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > rustup-init.sh
          sh rustup-init.sh -y --default-toolchain ${{ matrix.cfg_release_channel }}

      # Verify rustup and cargo installation
      - name: Verify installation
        run: |
          . "$HOME/.cargo/env"
          rustup --version
          cargo --version

      # Cache the downloaded packages
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      # Build the project
      - name: Build
        run: |
          . "$HOME/.cargo/env"
          cargo build --verbose --target ${{ matrix.target }}

      # Build the release version
      - name: Build release version
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --target ${{ matrix.target }}

      # Upload the built binaries
      - name: Upload debug binary
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch_name }}-debug
          path: target/${{ matrix.target }}/debug/ralfpack

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch_name }}
          path: target/${{ matrix.target }}/release/ralfpack

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/debug/build/*
            target/${{ matrix.target }}/release/build/*
